server {
    listen 80;
    server_name localhost;

    # Root directory — where Vite's dist/ files were copied to
    root /usr/share/nginx/html;
    index index.html;

    # -------------------------------------------------------
    # SPA fallback: client-side routing support
    # -------------------------------------------------------
    # $uri          → try to serve the exact file requested (e.g. /assets/main.js)
    # $uri/         → if it's a directory, try its index file
    # /index.html   → if neither exists, serve index.html so React Router handles the route
    # This prevents 404s when a user refreshes on /dashboard, /profile, etc.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # -------------------------------------------------------
    # Cache static assets aggressively (1 year)
    # -------------------------------------------------------
    # Vite uses content-hashed filenames (e.g. main.abc123.js), so a new
    # build always produces new filenames — stale cache is never an issue.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # -------------------------------------------------------
    # Never cache index.html
    # -------------------------------------------------------
    # index.html is the entry point. If it were cached, users could be stuck
    # on an old version even after you deploy updates.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # -------------------------------------------------------
    # Gzip compression
    # -------------------------------------------------------
    # Compresses responses before sending — a 500 KB JS bundle can shrink to ~100 KB
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
